name: Publish website

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore website files
        shell: bash
        run: |
          cat .parts/01 .parts/02 .parts/03 .parts/04 | base64 -d | bzip2 -dc | tar -xf -
          rm -rf .parts .publish-trigger .github/workflows/bootstrap.yml
          rmdir .github/workflows .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "Build today's caution experience"
          git push
