name: Publish website

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore website files
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/site.tar.gz
          tar -xzf /tmp/site.tar.gz -C .
          rm -f .github/workflows/bootstrap.yml
          rmdir .github/workflows .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "Build today's caution experience"
          git push